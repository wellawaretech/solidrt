name: Release

on:
  push:
    tags:
      - 'v*'
  # Allows manually triggering the workflow from the Actions tab on GitHub.
  # Use this for dry runs before tagging a real release:
  #   Actions -> Release -> Run workflow -> dry_run: checked (default)
  # To do a real publish via manual trigger, uncheck dry_run.
  # Tag pushes (v*) always publish for real regardless of this input.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build and pack but do not publish)'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install system dependencies
        run: >
          sudo apt-get install -y
          libclang-dev clang
          build-essential git make pkg-config cmake ninja-build gnome-desktop-testing
          libwayland-dev libdecor-0-dev libpipewire-0.3-dev liburing-dev
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev
          libxkbcommon-dev libdrm-dev libgbm-dev
          libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev
          libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev
          libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: make dist-linux VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x64-gnu
          path: packages/linux-x64-gnu/solidrt-go

  build-darwin:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: make dist-darwin VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: darwin-arm64
          path: |
            packages/darwin-arm64/solidrt-go
            packages/darwin-arm64/libimpeller.dylib
            packages/darwin-arm64/libEGL.dylib
            packages/darwin-arm64/libGLESv2.dylib

  build-android:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install system dependencies
        run: >
          sudo apt-get install -y
          libclang-dev clang
          build-essential git make pkg-config cmake ninja-build

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: NDK_HOME="$ANDROID_NDK_ROOT" make dist-android VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-arm64-v8a
          path: packages/android-arm64-v8a/solidrt-dev.apk

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Add MSYS2 tools to PATH
        run: echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: make dist-windows VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: win32-x64-msvc
          path: |
            packages/win32-x64-msvc/solidrt-go.exe
            packages/win32-x64-msvc/libEGL.dll
            packages/win32-x64-msvc/libGLESv2.dll

  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-linux, build-darwin, build-windows, build-android]
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute version and publish flags
        id: flags
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "${{ inputs.dry_run }}" == "true" ]]; then
            # Dry-run dispatch from a branch: use a placeholder, nothing will be published
            VERSION="0.0.0-dry-run"
          else
            echo "::error::Real publish requires a vX.Y.Z tag, got: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Derive dist-tag from the prerelease identifier:
          # 0.0.1-exp.1 -> exp, 1.0.0-beta.3 -> beta, 1.0.0-rc.1 -> rc
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            echo "tag_flag=--tag $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag_flag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Bump package versions
        run: |
          VERSION="${{ steps.flags.outputs.version }}"
          for dir in packages/core packages/darwin-arm64 packages/linux-x64-gnu packages/win32-x64-msvc packages/android-arm64-v8a packages/cli; do
            (cd "$dir" && npm pkg set version="$VERSION")
          done

      - name: Refresh lockfile with bumped versions
        run: bun update

      - name: Download Linux binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-x64-gnu
          path: packages/linux-x64-gnu

      - name: Download Darwin binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: darwin-arm64
          path: packages/darwin-arm64

      - name: Download Windows binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: win32-x64-msvc
          path: packages/win32-x64-msvc

      - name: Download Android APK
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: android-arm64-v8a
          path: packages/android-arm64-v8a

      - name: Restore executable bit on binaries
        run: |
          chmod +x packages/linux-x64-gnu/solidrt-go
          chmod +x packages/darwin-arm64/solidrt-go

      - name: Publish @solidrt/core
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/darwin-arm64
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/darwin-arm64
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/linux-x64-gnu
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/linux-x64-gnu
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/win32-x64-msvc
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/win32-x64-msvc
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/android-arm64-v8a
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/android-arm64-v8a
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/cli
        run: bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/cli
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
