name: Release

on:
  push:
    tags:
      - 'v*'
  # Allows manually triggering the workflow from the Actions tab on GitHub.
  # Use this for dry runs before tagging a real release:
  #   Actions -> Release -> Run workflow -> dry_run: checked (default)
  # To do a real publish via manual trigger, uncheck dry_run.
  # Tag pushes (v*) always publish for real regardless of this input.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build and pack but do not publish)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install system dependencies
        run: >
          sudo apt-get install -y
          libclang-dev clang
          build-essential git make pkg-config cmake ninja-build gnome-desktop-testing
          libwayland-dev libdecor-0-dev libpipewire-0.3-dev liburing-dev
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev
          libxkbcommon-dev libdrm-dev libgbm-dev
          libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev
          libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev libsndio-dev
          libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev libusb-1.0-0-dev

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: make dist-linux VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux-x64-gnu
          path: packages/linux-x64-gnu/solidrt-go

  build-darwin:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install JS dependencies
        run: bun install

      - name: Build
        run: make dist-darwin VERSION="${GITHUB_REF_NAME#v}"

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: darwin-arm64
          path: |
            packages/darwin-arm64/solidrt-go
            packages/darwin-arm64/libimpeller.dylib
            packages/darwin-arm64/libEGL.dylib
            packages/darwin-arm64/libGLESv2.dylib

  publish:
    runs-on: ubuntu-24.04
    needs: [build-linux, build-darwin]
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate ref is a version tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Workflow must be triggered from a vX.Y.Z tag, got: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Compute publish flags
        id: flags
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            # Derive dist-tag from the prerelease identifier:
            # 0.0.1-exp.1 -> exp, 1.0.0-beta.3 -> beta, 1.0.0-rc.1 -> rc
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            echo "tag_flag=--tag $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag_flag=" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install JS dependencies
        run: bun install

      - name: Download Linux binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: linux-x64-gnu
          path: packages/linux-x64-gnu

      - name: Download Darwin binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: darwin-arm64
          path: packages/darwin-arm64

      - name: Publish @solidrt/core
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/darwin-arm64
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/linux-x64-gnu
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/linux-x64-gnu
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @solidrt/cli
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version
          bun publish --access public ${{ steps.flags.outputs.tag_flag }} ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
